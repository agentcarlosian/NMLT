[[components]]
id = "host.hardware_os_filesystem"
paths = []
role = "Read exact bytes and execute trusted code; a compromised host can forge all local evidence."

[[components]]
id = "crypto.sha256"
paths = []
role = "SHA-256 collision/second-preimage resistance and the host implementations used by Rust/Python are trusted for v1 identity."

[[components]]
id = "toolchain.rust"
paths = ["rust-toolchain.toml", "Cargo.lock"]
version = "1.94.0"
role = "Compile the Rust workspace. The version declaration is exact; bootstrap binaries and system linker remain residual trust."

[[components]]
id = "toolchain.lean"
paths = [
  "mechanization/lean/lean-toolchain",
  "mechanization/lean/lakefile.toml",
  "mechanization/lean/lake-manifest.json",
]
version = "v4.30.0"
role = "Compile Lean statements and proofs. Downloaded tool binaries are not yet recorded by digest."

[[components]]
id = "toolchain.python3"
paths = []
role = "Execute the standard-library-only identity and evidence checkers; runtime binary and stdlib are runner-supplied residual trust."

[[components]]
id = "ci.checkout_action"
paths = [".github/workflows/ci.yml"]
version = "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683"
role = "Fetch the repository in CI at the documented v4.2.2 action commit."

[[components]]
id = "ci.lean_action"
paths = [".github/workflows/ci.yml"]
version = "leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9"
role = "Install the declared Lean toolchain and build the Lake package under the documented v1.5.0 action commit; its mutable built-in NanoDA path is disabled."

[[components]]
id = "lean.kernel_and_nanoda"
paths = ["tools/check_nanoda.sh"]
version = "Lean v4.30.0; lean4export@a3e35a584f59b390667db7269cd37fca8575e4bf; nanoda_lib@f58f2f6d535e189a40fcb02ede8eb95f97a92d37; Rust 1.94.0"
role = "Use the Lean kernel and a separately built NanoDA checker over the exported environment. Exporter, checker, Rust, and configuration sources are pinned; downloaded and locally built binary digests are not yet persisted."

[[components]]
id = "nmlt_core.frontend"
paths = [
  "crates/nmlt-core/src/lexer.rs",
  "crates/nmlt-core/src/cst.rs",
  "crates/nmlt-core/src/syntax.rs",
]
role = "Lossless lexing, immutable CST construction, recovery, and structural recognition."

[[components]]
id = "nmlt_core.diagnostic"
paths = ["crates/nmlt-core/src/diagnostic.rs"]
role = "Stable diagnostic classification and byte-span rendering."

[[components]]
id = "nmlt_core.surface_projection"
paths = ["crates/nmlt-core/src/untyped.rs"]
role = "Project the lossless CST into ordered explicit surface nodes, enforce exact semantic-origin coverage, and classify the first M9 syntax feature boundary."

[[components]]
id = "nmlt_hir.identity"
paths = [
  "crates/nmlt-hir/src/identity.rs",
  "crates/nmlt-hir/src/hir.rs",
  "crates/nmlt-hir/src/model.rs",
]
role = "Construct exact source-set, logical-module-map, canonical-surface, module, full typed definition-path, semantic-node, and resolved-program identities."

[[components]]
id = "nmlt_hir.resolver"
paths = [
  "crates/nmlt-hir/src/resolve_terms.rs",
  "crates/nmlt-hir/src/resolver.rs",
  "crates/nmlt-hir/src/surface.rs",
  "crates/nmlt-hir/src/term.rs",
]
role = "Adapt the lossless projection into named resolver input, validate the closed source/module set, parse admitted raw terms, assign owner-derived locals, resolve every reference, and replay exact spelling, candidate selection, graph closure, and ResolutionMap bijection. Resolver and replay share this trusted crate."

[[components]]
id = "nmlt_ir.structural_core"
paths = [
  "crates/nmlt-ir/src/identity.rs",
  "crates/nmlt-ir/src/lib.rs",
  "crates/nmlt-ir/src/model.rs",
  "crates/nmlt-ir/src/validate.rs",
]
role = "Define canonical explicit typed core and reject malformed annotations, indices, scopes, graphs, frames, integers, identities, and resource excess. This component does not check HIR-to-core elaboration correspondence."

[[components]]
id = "nmlt_elaborate.producer"
paths = [
  "crates/nmlt-elaborate/src/elaborate.rs",
  "crates/nmlt-elaborate/src/identity.rs",
  "crates/nmlt-elaborate/src/lib.rs",
  "crates/nmlt-elaborate/src/model.rs",
]
role = "Bidirectionally elaborate exact resolved HIR into structurally validated typed core and emit a canonical, identity-bound, fully reachable derivation DAG with exact root and HIR-origin coverage. This producer remains trusted and cannot issue CheckedProgram before independent M9-006 replay."

[[components]]
id = "nmlt_core.evidence_scaffold"
paths = ["crates/nmlt-core/src/evidence.rs", "schemas/evidence-manifest.schema.json"]
role = "Emit only legacy structural unknown scaffolds and define the generic manifest shape."

[[components]]
id = "nmlt_cli"
paths = ["crates/nmlt-cli/src/main.rs"]
role = "Route frontend, type-check, and model-check commands without raising a method's result ceiling."

[[components]]
id = "nmlt_engine.semantic_kernel"
paths = [
  "crates/nmlt-engine/src/ast.rs",
  "crates/nmlt-engine/src/parser.rs",
  "crates/nmlt-engine/src/types.rs",
]
role = "Parse/elaborate the executable fragment and enforce type, frame, system-index, and affine-capability rules."

[[components]]
id = "nmlt_engine.explicit_state"
paths = ["crates/nmlt-engine/src/model.rs"]
role = "Evaluate simultaneous updates and classify deterministic finite exploration, bounds, and counterexamples."

[[components]]
id = "nmlt_temporal.kernel"
paths = [
  "crates/nmlt-temporal/src/graph.rs",
  "crates/nmlt-temporal/src/temporal.rs",
  "crates/nmlt-temporal/src/observation.rs",
  "crates/nmlt-temporal/src/refinement.rs",
  "crates/nmlt-temporal/src/runtime.rs",
]
role = "Construct finite graphs/lassos, interpret explicit fairness and hiding, check finite simulation, and classify supplied traces."

[[components]]
id = "nmlt_verify.vc_kernel"
paths = ["crates/nmlt-verify/src/ir.rs", "crates/nmlt-verify/src/identity.rs"]
role = "Validate and identify the finite verification condition and evaluate its closed Boolean expressions."

[[components]]
id = "nmlt_verify.certificate_checker"
paths = ["crates/nmlt-verify/src/certificate.rs"]
role = "Reconstruct and check the exact finite invariant certificate obligation."

[[components]]
id = "nmlt_verify.result_normalizer"
paths = ["crates/nmlt-verify/src/evidence.rs"]
role = "Replay witnesses, reject stale/disagreeing returns, and cap results unless a certificate is accepted."

[[components]]
id = "nmlt_agent.authority_kernel"
paths = [
  "crates/nmlt-agent/src/authority.rs",
  "crates/nmlt-agent/src/artifact.rs",
  "crates/nmlt-agent/src/digest.rs",
  "crates/nmlt-agent/src/graph.rs",
]
role = "Bind protected artifacts/spans and reject repairs outside declared edit authority."

[[components]]
id = "nmlt_agent.evaluation_harness"
paths = [
  "crates/nmlt-agent/src/evaluation.rs",
  "crates/nmlt-agent/src/feedback.rs",
  "crates/nmlt-agent/src/bin/evaluate.rs",
]
role = "Apply deterministic evaluation policy and report repair metrics; it does not establish semantic proof."

[[components]]
id = "nmlt_grades.kernel"
paths = [
  "crates/nmlt-grades/src/algebra.rs",
  "crates/nmlt-grades/src/parser.rs",
  "crates/nmlt-grades/src/checker.rs",
]
role = "Interpret product grades and check declared finite resource budgets."

[[components]]
id = "nmlt_lean.statements"
paths = [
  "mechanization/lean/NMLT.lean",
  "mechanization/lean/NMLT/Core/TypedCore.lean",
  "mechanization/lean/NMLT/Core/Transition.lean",
  "mechanization/lean/NMLT/Core/Provider.lean",
  "mechanization/lean/NMLT/Counterexamples/CompositionCongruence.lean",
  "mechanization/lean/NMLT/Grades/Algebra.lean",
  "mechanization/lean/NMLT/Typing/Judgments.lean",
  "mechanization/lean/NMLT/Metatheory/Soundness.lean",
]
role = "Definitions and theorem statements whose exact compiled proof terms are accepted; scope does not extend to Rust correspondence."

[[components]]
id = "tools.canonical_examples"
paths = ["tools/canonical_examples.py"]
role = "Reference calculation and readback of exact source/source-set identity."

[[components]]
id = "docs.artifact_identity"
paths = ["docs/artifact-identity.md"]
role = "Normative v1 domain separation, canonicalization subset, and identity contract."

[[components]]
id = "tools.benchmark_integrity_checker"
paths = [
  "tools/validate_benchmark_integrity.py",
  "schemas/benchmark-suite-v1.schema.json",
  "schemas/benchmark-result-v1.schema.json",
]
role = "Validate frozen intent/property/witness/result bindings and schema subsets."

[[components]]
id = "tools.model_result_checker"
paths = [
  "tools/check_model_reports.py",
  "schemas/model-check-report.schema.json",
  "schemas/benchmark-result-v1.schema.json",
]
role = "Rebuild/run the bounded engine, bind executable/source/configuration identities, and independently read back result reports."

[[components]]
id = "tools.evidence_checker"
paths = [
  "tools/check_evidence.py",
  "schemas/evidence-manifest.schema.json",
  "tools/validate_benchmark_integrity.py",
]
role = "Recompute manifest/source bindings and reject missing engine, TCB, bounds, witness, and certificate requirements."

[[components]]
id = "tools.temporal_evidence_checker"
paths = ["tools/check_temporal_evidence.py", "schemas/temporal-evidence-v1.schema.json"]
role = "Rebuild and read back finite temporal, refinement, and runtime evidence."

[[components]]
id = "tools.multi_engine_evidence_checker"
paths = ["tools/check_multi_engine_evidence.py", "schemas/multi-engine-evidence-v1.schema.json"]
role = "Read back independent raw routes, checked certificates, disagreement policy, and exact engine bindings."

[[components]]
id = "tools.agentic_evidence_checker"
paths = ["tools/check_phase6_evidence.py", "schemas/phase6-evidence-graph-v1.schema.json"]
role = "Rebuild/read back the authority-bounded repair evaluation and its exact runtime-drift artifact edge."

[[components]]
id = "tools.graded_evidence_checker"
paths = ["tools/check_graded_evidence.py", "schemas/graded-evidence-v1.schema.json"]
role = "Rebuild/read back graded-resource results, adversarial controls, and exact separately checked Lean algebra bindings."

[[components]]
id = "tools.metatheory_policy_checker"
paths = ["tools/check_metatheory.sh"]
role = "Reject forbidden proof placeholders and invoke the pinned Lean build; the shell and host tools remain trusted."

[[components]]
id = "build.ci_release"
paths = ["Makefile", "Cargo.toml", "Cargo.lock", ".github/workflows/ci.yml"]
role = "Compose repository gates with least-privilege CI. This is not yet a reproducible or signed release pipeline."
