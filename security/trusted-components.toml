[[claim_profiles]]
name = "temporal_refinement_and_runtime_trace"
result_ceiling = "model_checked_refuted_or_monitored"
trusted = [
  "host.hardware_os_filesystem",
  "toolchain.rust",
  "nmlt_temporal.kernel",
  "tools.temporal_evidence_checker",
  "crypto.sha256",
]

[[claim_profiles]]
name = "checked_finite_verification_condition"
result_ceiling = "proved_for_exact_finite_vc_only"
trusted = [
