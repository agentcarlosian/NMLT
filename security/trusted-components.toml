manifest_version = "1.1.0"
status = "pre-alpha"
reviewed = "2026-07-18"
identity_requirement = "Every assurance manifest binds the exact source/source set, engine source set and executable, and each relied-on component by a content address; generic and graded assurance evidence also binds the exact bytes of this inventory, which names roles but is not itself a digest ledger."

outside_tcb = [
  "examples, intent prose, benchmark expectations, dashboards, and visual renderers",
  "AI-generated repair candidates and the nmlt-agent deterministic assistant baseline",
  "fuzzers, mutation generators, proof search, and test counts",
  "TLC, Quint, P, SMT solvers, and proof-assistant stdout unless a narrower trusted checker validates a certificate for the exact obligation",
  "nmlt-verify reachability, induction, SMT, and proof-return producers when a checked certificate or replayed witness is the accepted basis",
  "runtime events and traces before the declared observation/refinement adapter checks them",
]

residual_trust = [
  "host CPU, memory, kernel, filesystem, process isolation, clocks, and SHA-256 implementation",
  "GitHub-hosted ubuntu-latest runner image and network delivery are not content-pinned",
  "rustup/elan and language release download/bootstrap chains are version-pinned but their installed binaries are not yet recorded by digest in this repository",
  "Python 3 and its standard library are supplied by the runner and are not version- or binary-digest-pinned",
  "Cargo/Lean dependency acquisition, linker, system libraries, and build environment are not yet reproducibly attested",
  "local content addresses establish byte identity, not authorship, freshness, signing, or transparency-log inclusion",
  "no verified compiler theorem connects the Rust executable frontend/IR to the Lean metatheory",
]

forbidden_claims = [
  "semantic verification from structural parsing",
  "unbounded proof from finite exploration",
  "proof acceptance from solver status, proof-assistant stdout, or an unchecked/non-content-addressed certificate",
  "safe automatic replay after an indeterminate external effect",
  "production authorization by any pre-alpha NMLT result",
  "signing, provenance, or transparency from an unsigned digest-only manifest",
]

[[claim_profiles]]
name = "structural_acceptance"
result_ceiling = "unknown"
trusted = [
  "host.hardware_os_filesystem",
  "toolchain.rust",
  "nmlt_core.frontend",
  "nmlt_core.diagnostic",
  "nmlt_core.evidence_scaffold",
  "nmlt_cli",
  "build.ci_release",
]

[[claim_profiles]]
name = "canonical_source_identity_reference"
result_ceiling = "identity_only"
trusted = [
  "host.hardware_os_filesystem",
  "toolchain.python3",
  "crypto.sha256",
  "tools.canonical_examples",
  "docs.artifact_identity",
]

[[claim_profiles]]
name = "typed_bounded_model_check"
result_ceiling = "model_checked_or_refuted"
trusted = [
