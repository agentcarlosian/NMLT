name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install 1.94.0 --profile minimal --component rustfmt,clippy

      - name: Run repository gate
        run: make ci

  lean:
    name: Lean metatheory
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # External checker builds stay outside NMLT's Rust workspace so Cargo
      # cannot treat helper checkouts as nested workspace members.
      - name: Stage Lean package outside Rust workspace
        id: stage_lean
        run: |
          lean_package_dir="$(mktemp -d "${RUNNER_TEMP}/nmlt-lean.XXXXXX")"
          cp -a mechanization/lean/. "${lean_package_dir}/"
          echo "path=${lean_package_dir}" >> "${GITHUB_OUTPUT}"

      - name: Build Lean artifacts
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: ${{ steps.stage_lean.outputs.path }}
          build: true
          nanoda: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Independently check Lean artifacts with pinned nanoda
        env:
          NANODA_ALLOW_SORRY: "false"
        run: ./tools/check_nanoda.sh "${{ steps.stage_lean.outputs.path }}" NMLT

      - name: Enforce metatheory source policy
        run: ./tools/check_metatheory.sh
