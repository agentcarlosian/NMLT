name: Research proposal
description: Propose a language, semantics, verification, or research direction.
title: "research: "
labels: [research]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: State the concrete limitation or research question before proposing syntax.
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Existing evidence and primary sources
    validations:
      required: true
  - type: textarea
    id: falsification
    attributes:
      label: Negative controls or falsification plan
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Non-goals, risks, and unresolved questions
